<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Originality Metadata Purger</title>
    <script src="coi-serviceworker.js"></script>

    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1c1c1e;
            --accent-color: #fe2c55;
            --accent-blue: #25f4ee;
            --text-color: #f1f1f3;
            --text-muted: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2e;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
            background: linear-gradient(90deg, var(--accent-color), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
        }

        .upload-zone {
            border: 2px dashed #3a3a3c;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
        }

        .upload-zone input {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .tweak-panel {
            background: #262629;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .tweak-panel h3 {
            font-size: 14px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-label input {
            accent-color: var(--accent-color);
            width: 16px;
            height: 16px;
        }

        button.btn-process {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }

        button.btn-process:hover {
            background: #e12246;
        }

        button:disabled {
            background: #3a3a3c;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .status-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar {
            background: #262629;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-color));
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            word-break: break-all;
        }

        .download-box {
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .btn-download {
            display: inline-block;
            background: var(--accent-blue);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn-download:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>TikTok Unique-Fi</h1>
    <p class="subtitle">Wipes video metadata and rewrites signature pixels completely in-browser.</p>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🎬</div>
        <div id="uploadText">Click or Drag & Drop MP4 Video</div>
        <input type="file" id="fileInput" accept="video/mp4,video/quicktime">
    </div>

    <div class="tweak-panel">
        <h3>Processing Modifiers</h3>
        <div class="checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" id="wipeMeta" checked disabled>
                Nuke Global Metadata & Timestamps (Forced)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="applyZoom" checked>
                Apply Invisible Scale Adjust (1.01% Scale + Crop)
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="applyColor" checked>
                Subtle Saturation & Contrast Alternation
            </label>
        </div>
    </div>

    <button id="processBtn" class="btn-process" disabled>Loading video engine...</button>

    <div class="status-container" id="statusContainer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="status-text" id="statusText">Initializing components...</div>
    </div>

    <div class="download-box" id="downloadBox">
        <p style="margin-bottom: 12px; font-size: 14px; color: #25f4ee;">✓ Video signature successfully reconstructed!</p>
        <a id="downloadLink" class="btn-download" href="#" download="cleaned_tiktok_video.mp4">Save Transformed Video</a>
    </div>
</div>

<script type="module">
    import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.15/dist/esm/index.js';
    import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.2/dist/esm/index.js';

    const ffmpeg = new FFmpeg();

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const uploadText = document.getElementById('uploadText');
    const processBtn = document.getElementById('processBtn');
    const statusContainer = document.getElementById('statusContainer');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const downloadBox = document.getElementById('downloadBox');
    const downloadLink = document.getElementById('downloadLink');

    let selectedFile = null;
    let ffmpegReady = false;

    function updateProcessButton() {
        if (!ffmpegReady) {
            processBtn.disabled = true;
            return;
        }
        if (selectedFile) {
            processBtn.disabled = false;
            processBtn.innerText = 'Purge & Transform Video';
        } else {
            processBtn.disabled = true;
            processBtn.innerText = 'Select a video to process';
        }
    }

    async function initFFmpeg() {
        statusContainer.style.display = 'block';
        statusText.innerText = 'Downloading video engine (first visit may take a moment)...';

        try {
            const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
            await ffmpeg.load({
                coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
            });

            ffmpegReady = true;
            statusText.innerText = 'Engine ready. Select a video to begin.';
            updateProcessButton();
        } catch (error) {
            console.error(error);
            ffmpegReady = false;
            statusText.innerText = `Engine failed to load: ${error.message}. Try a hard refresh — cross-origin isolation is required.`;
            processBtn.innerText = 'Engine unavailable';
            processBtn.disabled = true;
        }
    }

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) handleFileSelection(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent-blue)';
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#3a3a3c';
    });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#3a3a3c';
        if (e.dataTransfer.files.length > 0) handleFileSelection(e.dataTransfer.files[0]);
    });

    function handleFileSelection(file) {
        selectedFile = file;
        uploadText.innerText = `${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
        downloadBox.style.display = 'none';
        updateProcessButton();
    }

    processBtn.addEventListener('click', async () => {
        if (!selectedFile || !ffmpegReady) return;

        statusContainer.style.display = 'block';
        downloadBox.style.display = 'none';
        processBtn.disabled = true;
        progressFill.style.width = '0%';

        ffmpeg.on('log', ({ message }) => {
            console.log(message);
            if (message.includes('frame=')) {
                statusText.innerText = `Analyzing and adjusting pixels... ${message.substring(0, 40)}`;
            }
        });

        ffmpeg.on('progress', ({ progress }) => {
            const pct = Math.min(Math.round(progress * 100), 99);
            progressFill.style.width = `${pct}%`;
            statusText.innerText = `Transforming video stream matrices... (${pct}%)`;
        });

        try {
            statusText.innerText = 'Loading raw video timeline data...';
            await ffmpeg.writeFile('input.mp4', await fetchFile(selectedFile));

            const useZoom = document.getElementById('applyZoom').checked;
            const useColor = document.getElementById('applyColor').checked;

            const ffmpegArgs = ['-i', 'input.mp4', '-map_metadata', '-1'];

            const videoFilters = [];
            if (useZoom) {
                videoFilters.push('scale=1.01*iw:-1', 'crop=iw/1.01:ih/1.01');
            }
            if (useColor) {
                videoFilters.push('eq=contrast=1.005:saturation=1.01:brightness=0.002');
            }

            if (videoFilters.length > 0) {
                ffmpegArgs.push('-vf', videoFilters.join(','));
            }

            ffmpegArgs.push('-c:v', 'libx264', '-crf', '22', '-preset', 'ultrafast', '-c:a', 'aac', 'output.mp4');

            statusText.innerText = 'Executing matrix overrides. Do not close tab...';
            await ffmpeg.exec(ffmpegArgs);

            statusText.innerText = 'Reassembling final video file layers...';
            const data = await ffmpeg.readFile('output.mp4');

            const cleanBlob = new Blob([data.buffer], { type: 'video/mp4' });
            const downloadUrl = URL.createObjectURL(cleanBlob);

            progressFill.style.width = '100%';
            statusText.innerText = 'Complete! Video fingerprint updated.';

            downloadLink.href = downloadUrl;
            downloadBox.style.display = 'block';
        } catch (err) {
            console.error(err);
            statusText.innerText = `Process Failed: ${err.message || 'Unknown error.'}`;
        } finally {
            updateProcessButton();
        }
    });

    initFFmpeg();
</script>
</body>
</html>
